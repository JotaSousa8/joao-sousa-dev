# Deploy Analytics API → Azure Container Apps (Terraform + GHCR)
#
# Triggers on every push to main (or manual run).
# Setup: see analytics/DEPLOY.md (incl. Terraform remote state for CI)

name: Deploy analytics API

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: joao-sousa-analytics
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-joaosousa-analytics-ne' }}
  AZURE_CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP || 'ca-joaosousa-analytics' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'northeurope' }}
  TF_WORKING_DIR: infra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:latest,${IMAGE}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_pin=${IMAGE}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure resource providers
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          az provider register --namespace Microsoft.Storage --wait

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          set -euo pipefail
          # Enable remote state when the example file is present as backend.azurerm.tf
          if [[ -f backend.azurerm.tf.example && ! -f backend.azurerm.tf ]]; then
            echo "Copying backend.azurerm.tf.example → backend.azurerm.tf for CI remote state."
            cp backend.azurerm.tf.example backend.azurerm.tf
          fi
          terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_analytics_api_key: ${{ secrets.ANALYTICS_API_KEY }}
          TF_VAR_analytics_ip_salt: ${{ secrets.ANALYTICS_IP_SALT }}
          TF_VAR_image: ${{ steps.meta.outputs.image_pin }}
          TF_VAR_location: ${{ env.AZURE_LOCATION }}
          TF_VAR_resource_group_name: ${{ env.AZURE_RESOURCE_GROUP }}
          TF_VAR_container_app_name: ${{ env.AZURE_CONTAINER_APP }}
        run: |
          set -euo pipefail
          terraform apply -auto-approve -input=false

      - name: Job summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          set -euo pipefail
          URL=$(terraform output -raw url)
          HEALTH=$(terraform output -raw health_url)
          echo "### Analytics API" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: \`${URL}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Health: \`${HEALTH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Set site meta: \`<meta name=\"analytics-endpoint\" content=\"${URL}\" />\`" >> "$GITHUB_STEP_SUMMARY"
