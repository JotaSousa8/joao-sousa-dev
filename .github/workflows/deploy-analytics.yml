# Deploy Analytics API → Azure Container Apps
#
# Active path: Azure CLI (az containerapp).
# Terraform under infra/ is prepared but not used yet — see commented block below.
# One-time Azure setup: see analytics/DEPLOY.md

name: Deploy analytics API

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: joao-sousa-analytics
  # Override these in repo Variables if you use different names
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-joaosousa-analytics-ne' }}
  AZURE_CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP || 'ca-joaosousa-analytics' }}
  # westeurope often blocks new Log Analytics on free/trial; north europe is safer
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'northeurope' }}
  # TF_WORKING_DIR: infra  # enable when switching to Terraform

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate analytics config JSON
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, pathlib, sys
          root = pathlib.Path("analytics")
          files = ["appsettings.json", "appsettings.Development.json"]
          for name in files:
              path = root / name
              if not path.exists():
                  print(f"skip missing {path}")
                  continue
              try:
                  json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as ex:
                  print(f"ERROR: {path} is invalid JSON: {ex}", file=sys.stderr)
                  sys.exit(1)
              print(f"ok {path}")
          PY

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:latest,${IMAGE}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_pin=${IMAGE}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps environment exists
        run: |
          set -euo pipefail
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          LOC="${{ env.AZURE_LOCATION }}"
          APP="${{ env.AZURE_CONTAINER_APP }}"
          ENV_NAME="${APP}-env"
          IMAGE_SHORT="${{ steps.meta.outputs.image }}:$(echo '${{ github.sha }}' | cut -c1-7)"

          echo "Registering required resource providers..."
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait

          az group create --name "$RG" --location "$LOC" --output none

          if ! az containerapp env show --name "$ENV_NAME" --resource-group "$RG" &>/dev/null; then
            # --logs-destination none avoids creating a Log Analytics workspace
            # (many trial subscriptions cannot create new LAW in some regions)
            az containerapp env create \
              --name "$ENV_NAME" \
              --resource-group "$RG" \
              --location "$LOC" \
              --logs-destination none \
              --output none
          fi

          if ! az containerapp show --name "$APP" --resource-group "$RG" &>/dev/null; then
            # Do not pass --registry-server for public GHCR images: Azure CLI requires
            # username+password together with it for any non-ACR registry.
            # Make the package public (see analytics/DEPLOY.md) so pulls work without a PAT.
            az containerapp create \
              --name "$APP" \
              --resource-group "$RG" \
              --environment "$ENV_NAME" \
              --image "$IMAGE_SHORT" \
              --target-port 8080 \
              --ingress external \
              --cpu 0.25 --memory 0.5Gi \
              --min-replicas 0 --max-replicas 1 \
              --secrets \
                "analytics-api-key=${{ secrets.ANALYTICS_API_KEY }}" \
                "analytics-ip-salt=${{ secrets.ANALYTICS_IP_SALT }}" \
                "analytics-connection-string=${{ secrets.ANALYTICS_CONNECTION_STRING }}" \
              --env-vars \
                "Analytics__ApiKey=secretref:analytics-api-key" \
                "Analytics__IpSalt=secretref:analytics-ip-salt" \
                "ConnectionStrings__Analytics=secretref:analytics-connection-string" \
                "ASPNETCORE_URLS=http://+:8080" \
              --output none
          fi

      - name: Deploy new revision
        env:
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_IP_SALT: ${{ secrets.ANALYTICS_IP_SALT }}
          ANALYTICS_CONNECTION_STRING: ${{ secrets.ANALYTICS_CONNECTION_STRING }}
        run: |
          set -euo pipefail
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          APP="${{ env.AZURE_CONTAINER_APP }}"
          SHA_SHORT=$(echo '${{ github.sha }}' | cut -c1-7)
          IMAGE_SHORT="${{ steps.meta.outputs.image }}:${SHA_SHORT}"
          EXPECTED_REV="${APP}--${SHA_SHORT}"

          echo "Deploying image ${IMAGE_SHORT} → revision ${EXPECTED_REV}"

          # Validate + normalize secrets (password '#' must become %23 in URIs).
          # Heredoc body must stay indented for YAML; Actions strips the common indent.
          python3 - <<'PY'
          import os, sys, base64
          from urllib.parse import unquote, quote
          conn = (os.environ.get("ANALYTICS_CONNECTION_STRING") or "").strip().strip('"').strip("'")
          key = os.environ.get("ANALYTICS_API_KEY") or ""
          salt = os.environ.get("ANALYTICS_IP_SALT") or ""
          print(f"api_key_len={len(key)} ip_salt_len={len(salt)} conn_len={len(conn)}")
          if not key or not salt or not conn:
              print("ERROR: ANALYTICS_API_KEY / ANALYTICS_IP_SALT / ANALYTICS_CONNECTION_STRING must be set.", file=sys.stderr)
              sys.exit(1)
          low = conn.lower()
          placeholders = {"your-password", "[your-password]", "password", "changeme", "yoursecret"}

          def fail(msg):
              print(f"ERROR: {msg}", file=sys.stderr)
              sys.exit(1)

          def parse_pg_uri(uri: str):
              # Manual parse: urllib treats '#' as fragment and breaks passwords like 'xx#yy'.
              if "://" not in uri:
                  raise ValueError("missing ://")
              _, rest = uri.split("://", 1)
              db = "postgres"
              if "/" in rest:
                  rest, db = rest.split("/", 1)
                  db = db or "postgres"
              if "@" not in rest:
                  raise ValueError(
                      "missing USER:PASSWORD@HOST — expected "
                      "postgresql://postgres.PROJECT:PASSWORD@aws-....pooler.supabase.com:5432/postgres"
                  )
              userinfo, hostport = rest.rsplit("@", 1)
              if ":" not in userinfo:
                  raise ValueError(
                      "missing :PASSWORD before @HOST. "
                      "Correct: ...://postgres.PROJECT:YOUR_PASSWORD@HOST:5432/postgres"
                  )
              user, password = userinfo.split(":", 1)
              user, password = unquote(user), unquote(password)
              host, port = hostport, 5432
              if ":" in hostport and not hostport.startswith("["):
                  host, port_s = hostport.rsplit(":", 1)
                  if not port_s.isdigit():
                      raise ValueError(
                          f"invalid port {port_s!r}. Use :5432 after the host. "
                          "If the password has # @ : / ? encode them (%23 %40 %3A %2F %3F)."
                      )
                  port = int(port_s)
              return user, password, host, port, db

          if low.startswith(("postgres://", "postgresql://")):
              try:
                  user, password, host, port, db = parse_pg_uri(conn)
              except ValueError as ex:
                  fail(str(ex))
              print(f"uri_user={user} uri_host={host} uri_port={port} password_len={len(password)}")
              if not password or password.lower() in placeholders or (password.startswith("[") and password.endswith("]")):
                  fail("Replace [YOUR-PASSWORD] with the real Supabase DB password.")
              if port != 5432:
                  print("WARNING: Prefer session pooler port 5432 (not 6543/pgbouncer) for this API.")
              safe = (
                  f"postgresql://{quote(user, safe='')}:{quote(password, safe='')}"
                  f"@{host}:{port}/{db}"
              )
              if safe != conn:
                  print("normalized_uri=true (password special chars percent-encoded)")
              conn = safe
          elif low.startswith("host="):
              password = ""
              for part in conn.split(";"):
                  if part.lower().startswith("password="):
                      password = part.split("=", 1)[1]
                      break
              print(f"ado_password_len={len(password)}")
              if not password or password.lower() in placeholders or (password.startswith("[") and password.endswith("]")):
                  fail("Replace placeholder password in ANALYTICS_CONNECTION_STRING.")
          else:
              fail("ANALYTICS_CONNECTION_STRING must be postgresql:// URI or Host=... string.")

          if "[your-password]" in low or "your-password" in low:
              fail("Connection string still contains a password placeholder.")
          b64 = base64.b64encode(conn.encode("utf-8")).decode("ascii")
          open("/tmp/analytics-conn.txt", "w", encoding="utf-8").write(conn)
          open("/tmp/analytics-conn.b64", "w", encoding="utf-8").write(b64)
          print(f"canonical_conn_len={len(conn)} conn_b64_len={len(b64)}")
          PY

          # Set secrets via Python argv (first '=' only).
          export APP RG
          python3 - <<'PY'
          import os, subprocess
          app = os.environ["APP"]
          rg = os.environ["RG"]
          conn = open("/tmp/analytics-conn.txt", encoding="utf-8").read()
          b64 = open("/tmp/analytics-conn.b64", encoding="utf-8").read()
          cmd = [
              "az", "containerapp", "secret", "set",
              "--name", app,
              "--resource-group", rg,
              "--secrets",
              f"analytics-api-key={os.environ['ANALYTICS_API_KEY']}",
              f"analytics-ip-salt={os.environ['ANALYTICS_IP_SALT']}",
              f"analytics-connection-string={conn}",
              f"analytics-connection-string-b64={b64}",
              "--output", "none",
          ]
          print("Setting Container App secrets (api-key, ip-salt, connection-string, connection-string-b64)...")
          subprocess.check_call(cmd)
          PY

          # Give ACA a moment to register new secret versions before creating the revision.
          sleep 5

          dump_logs() {
            echo "::group::ACA revision ${EXPECTED_REV}"
            az containerapp revision show -n "$APP" -g "$RG" --revision "$EXPECTED_REV" -o json || true
            echo "::endgroup::"
            echo "::group::ACA console logs"
            az containerapp logs show -n "$APP" -g "$RG" --revision "$EXPECTED_REV" --type console --tail 200 || true
            echo "::endgroup::"
            echo "::group::ACA system logs"
            az containerapp logs show -n "$APP" -g "$RG" --revision "$EXPECTED_REV" --type system --tail 100 || true
            echo "::endgroup::"
          }

          # Cutover: allow 2 replicas so the new revision can start while the old one still runs.
          az containerapp revision set-mode \
            --name "$APP" \
            --resource-group "$RG" \
            --mode multiple \
            --output none

          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "$IMAGE_SHORT" \
            --revision-suffix "${SHA_SHORT}" \
            --cpu 0.5 --memory 1.0Gi \
            --min-replicas 1 \
            --max-replicas 2 \
            --set-env-vars \
              "Analytics__ApiKey=secretref:analytics-api-key" \
              "Analytics__IpSalt=secretref:analytics-ip-salt" \
              "ConnectionStrings__Analytics=secretref:analytics-connection-string" \
              "ConnectionStrings__AnalyticsB64=secretref:analytics-connection-string-b64" \
              "ANALYTICS_CONNECTION_STRING=secretref:analytics-connection-string" \
              "ASPNETCORE_URLS=http://+:8080" \
              "BUILD_SHA=${{ github.sha }}" \
            --output none

          echo "Waiting for ${EXPECTED_REV} to run..."
          READY=0
          for i in $(seq 1 36); do
            STATE=$(az containerapp revision show \
              --name "$APP" \
              --resource-group "$RG" \
              --revision "$EXPECTED_REV" \
              --query properties.runningState -o tsv 2>/dev/null || echo "Missing")
            echo "revision state attempt ${i}: ${STATE}"
            if [[ "$STATE" == "RunningAtMaxScale" || "$STATE" == "Running" ]]; then
              READY=1
              break
            fi
            if [[ "$STATE" == "Failed" || "$STATE" == "ActivationFailed" ]]; then
              echo "Revision entered terminal failure state: ${STATE}"
              dump_logs
              exit 1
            fi
            sleep 5
          done

          echo "Revision status before traffic cutover:"
          az containerapp revision list -n "$APP" -g "$RG" \
            --query "[].{name:name,image:properties.template.containers[0].image,active:properties.active,running:properties.runningState}" \
            -o table

          if [[ "$READY" -ne 1 ]]; then
            echo "New revision ${EXPECTED_REV} never reached Running"
            dump_logs
            exit 1
          fi

          # Show which env vars the new revision actually has (names only).
          echo "Revision env var names:"
          az containerapp revision show -n "$APP" -g "$RG" --revision "$EXPECTED_REV" \
            --query "properties.template.containers[0].env[].name" -o tsv || true

          az containerapp revision restart \
            --name "$APP" \
            --resource-group "$RG" \
            --revision "$EXPECTED_REV" \
            --output none || true
          sleep 8

          az containerapp ingress traffic set \
            --name "$APP" \
            --resource-group "$RG" \
            --revision-weight "${EXPECTED_REV}=100" \
            --output none

          mapfile -t OTHER_REVS < <(az containerapp revision list \
            --name "$APP" \
            --resource-group "$RG" \
            --query "[?properties.active && name!='${EXPECTED_REV}'].name" \
            -o tsv)
          for REV in "${OTHER_REVS[@]:-}"; do
            [[ -z "${REV}" ]] && continue
            echo "Deactivating ${REV}"
            az containerapp revision deactivate \
              --name "$APP" \
              --resource-group "$RG" \
              --revision "$REV" \
              --output none || true
          done

          az containerapp revision set-mode \
            --name "$APP" \
            --resource-group "$RG" \
            --mode single \
            --output none

          # Keep minReplicas=1 until health passes (avoids scale-to-zero flake), then idle scale.
          FQDN=$(az containerapp show -n "$APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          echo "### Analytics API" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: \`https://${FQDN}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Health: \`https://${FQDN}/health\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${IMAGE_SHORT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Revision: \`${EXPECTED_REV}\`" >> "$GITHUB_STEP_SUMMARY"

          echo "Waiting for Postgres health on https://${FQDN}/health ..."
          OK=0
          CONNECTED=0
          for i in $(seq 1 36); do
            BODY=$(curl -fsS "https://${FQDN}/health" || true)
            echo "health attempt ${i}: ${BODY}"
            if echo "${BODY}" | grep -q '"database":"postgresql"'; then
              OK=1
              if echo "${BODY}" | grep -q '"canConnect":true'; then
                CONNECTED=1
                break
              fi
            fi
            sleep 5
          done

          if [[ "$OK" -ne 1 ]]; then
            echo "Health check never reported database=postgresql (new image not serving)"
            dump_logs
            exit 1
          fi
          if [[ "$CONNECTED" -ne 1 ]]; then
            echo "Image is live but canConnect=false — fix ANALYTICS_CONNECTION_STRING (Supabase URI, port 5432, real password)."
            dump_logs
            exit 1
          fi

          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --min-replicas 0 \
            --max-replicas 1 \
            --output none

      # --- Terraform path (disabled for now; infra/ is ready for later) ---
      # Prerequisites before enabling: Azure tfstate storage + import existing RG/env/app.
      # See analytics/DEPLOY.md → "Terraform later".
