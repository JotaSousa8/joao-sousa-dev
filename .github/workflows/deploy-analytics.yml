      #     ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #     ARM_USE_OIDC: true
      #   run: |
      #     set -euo pipefail
      #     if [[ -f backend.azurerm.tf.example && ! -f backend.azurerm.tf ]]; then
      #       cp backend.azurerm.tf.example backend.azurerm.tf
      #     fi
      #     terraform init -input=false
